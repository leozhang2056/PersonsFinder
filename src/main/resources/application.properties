# =====================================
# Shared application config (all profiles)
# =====================================
server.port=5000

# H2 datasource
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA batch optimization
spring.jpa.properties.hibernate.jdbc.batch_size=200
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Springdoc OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Nearby search default radius (km)
app.nearby.default-radius=10

# Nearby search tuning
app.nearby.earth-radius-km=6371.0088
app.nearby.default-limit=100
app.nearby.adaptive-initial-radius=5.0
app.nearby.adaptive-padding=50
app.nearby.adaptive-max-radius=20000.0
